<svg width="960" height="680" viewBox="0 0 960 680" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Cromo Consultoria - Sobre Nos</title>
  <desc id="desc">Ilustracao abstrata representando colaboracao, tecnologia e desenvolvimento de liderancas.</desc>

  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="960" y2="680" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#121212"/>
      <stop offset="1" stop-color="#0A0A0A"/>
    </linearGradient>
    <linearGradient id="accent" x1="120" y1="130" x2="780" y2="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFD54D"/>
      <stop offset="1" stop-color="#F2B705"/>
    </linearGradient>
    <linearGradient id="line" x1="100" y1="240" x2="860" y2="240" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFC700" stop-opacity="0.08"/>
      <stop offset="0.5" stop-color="#FFC700" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#FFC700" stop-opacity="0.08"/>
    </linearGradient>
    <filter id="blurGlow" x="-200" y="-200" width="1360" height="1080" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feGaussianBlur stdDeviation="45" result="effect1_foregroundBlur"/>
    </filter>
  </defs>

  <rect width="960" height="680" rx="36" fill="url(#bg)"/>

  <g filter="url(#blurGlow)">
    <circle cx="190" cy="130" r="90" fill="#FFC700" fill-opacity="0.24"/>
    <circle cx="760" cy="530" r="120" fill="#FFC700" fill-opacity="0.18"/>
  </g>

  <rect x="68" y="72" width="824" height="536" rx="28" fill="#171717" stroke="#2E2E2E" stroke-width="2"/>

  <rect x="108" y="118" width="320" height="188" rx="20" fill="#121212" stroke="#323232"/>
  <text x="138" y="176" fill="#FFC700" font-family="Arial, Helvetica, sans-serif" font-size="22" font-weight="700" letter-spacing="2.4">SOBRE NOS</text>
  <text x="138" y="218" fill="#F2F2F2" font-family="Arial, Helvetica, sans-serif" font-size="40" font-weight="800" letter-spacing="1.2">CROMO</text>
  <text x="138" y="255" fill="#CECECE" font-family="Arial, Helvetica, sans-serif" font-size="21" font-weight="600" letter-spacing="0.8">CONSULTORIA</text>

  <path d="M476 170H835" stroke="url(#line)" stroke-width="2"/>
  <path d="M476 236H835" stroke="#2D2D2D" stroke-width="2"/>
  <path d="M476 302H835" stroke="#2D2D2D" stroke-width="2"/>

  <rect x="108" y="340" width="230" height="216" rx="18" fill="#111111" stroke="#303030"/>
  <rect x="365" y="340" width="230" height="216" rx="18" fill="#111111" stroke="#303030"/>
  <rect x="622" y="340" width="230" height="216" rx="18" fill="#111111" stroke="#303030"/>

  <circle cx="180" cy="410" r="28" fill="#1F1F1F" stroke="#FFC700" stroke-opacity="0.7"/>
  <circle cx="438" cy="410" r="28" fill="#1F1F1F" stroke="#FFC700" stroke-opacity="0.7"/>
  <circle cx="695" cy="410" r="28" fill="#1F1F1F" stroke="#FFC700" stroke-opacity="0.7"/>

  <rect x="152" y="457" width="142" height="12" rx="6" fill="#2F2F2F"/>
