  <rect x="667" y="457" width="142" height="12" rx="6" fill="#2F2F2F"/>
  <rect x="667" y="478" width="118" height="10" rx="5" fill="#282828"/>

  <path d="M291 233C340 182 393 182 446 233" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
  <path d="M548 259C598 214 652 214 704 259" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>

  <rect x="118" y="92" width="172" height="10" rx="5" fill="#232323"/>
  <rect x="307" y="92" width="92" height="10" rx="5" fill="#FFC700" fill-opacity="0.35"/>
